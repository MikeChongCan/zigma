<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="100%" height="100%">
  <!-- Definitions for gradients, filters, and markers -->
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#1C211E" />
    </pattern>
    
    <!-- Accent line gradients -->
    <linearGradient id="green-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9D36E" />
      <stop offset="100%" stop-color="#7BB04B" />
    </linearGradient>
    <linearGradient id="orange-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0643F" />
      <stop offset="100%" stop-color="#D04825" />
    </linearGradient>
    <linearGradient id="blue-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50A0F0" />
      <stop offset="100%" stop-color="#3080D0" />
    </linearGradient>
    <linearGradient id="grey-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8E959E" />
      <stop offset="100%" stop-color="#545B64" />
    </linearGradient>

    <!-- Glowing filters for active lines -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3D444D" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#A9D36E" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#F0643F" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#50A0F0" />
    </marker>
  </defs>

  <style>
    .header-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 850; fill: #FFFFFF; font-size: 24px; letter-spacing: 0.08em; }
    .header-subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 10px; fill: #5A626A; letter-spacing: 0.18em; }
    .group-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 750; fill: #FFFFFF; font-size: 13px; letter-spacing: 0.1em; }
    .node-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 650; fill: #ECEFEA; font-size: 12px; }
    .node-desc { font-family: system-ui, -apple-system, sans-serif; fill: #878E95; font-size: 10.5px; }
    .metadata { font-family: 'IBM Plex Mono', monospace; font-size: 9px; fill: #3D444D; letter-spacing: 0.05em; }
    .flow-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; letter-spacing: 0.04em; }
  </style>

  <!-- Dark Atmospheric Background -->
  <rect width="1000" height="620" fill="#0A0B0C" rx="14" />
  <rect width="1000" height="620" fill="url(#grid)" rx="14" />
  
  <!-- Outer structural border lines with crop ticks -->
  <rect x="12" y="12" width="976" height="596" fill="none" stroke="#1D2124" stroke-width="1" rx="10" />
  <line x1="12" y1="36" x2="988" y2="36" stroke="#1D2124" stroke-width="1" />
  <line x1="12" y1="584" x2="988" y2="584" stroke="#1D2124" stroke-width="1" />
  <line x1="36" y1="12" x2="36" y2="608" stroke="#1D2124" stroke-width="1" />
  <line x1="964" y1="12" x2="964" y2="608" stroke="#1D2124" stroke-width="1" />

  <!-- Corner coordinate ticks -->
  <text x="44" y="28" class="metadata">LOC: EDGE_REGION_01</text>
  <text x="840" y="28" class="metadata">SCALE: SYSTEM_FLOW_1.0</text>
  <text x="44" y="598" class="metadata">ZIGMA © 2026</text>
  <text x="860" y="598" class="metadata">STATUS: SYSTEM_ACTIVE</text>

  <!-- Title block -->
  <g transform="translate(60, 50)">
    <text x="0" y="20" class="header-title">ZIGMA</text>
    <text x="96" y="20" class="header-title" fill="#F0643F">ARCHITECTURE</text>
    <text x="0" y="36" class="header-subtitle">DOM-FIRST RENDERER · MULTIPLAYER ROOMS · EDGE INFRASTRUCTURE</text>
  </g>

  <!-- ==================== COLUMN 1: BROWSER CLIENT ==================== -->
  <g transform="translate(60, 110)">
    <!-- Container Card -->
    <rect width="270" height="450" rx="10" fill="#111315" stroke="#1D2226" stroke-width="1.5" />
    <rect width="80" height="3" rx="1.5" fill="url(#green-glow)" x="16" y="0" />
    <text x="16" y="26" class="group-title">BROWSER CLIENT (SPA)</text>
    <text x="16" y="40" class="metadata">SYSTEM_STATE: FRONTEND</text>

    <!-- Node 1: React DOM Renderer -->
    <g transform="translate(16, 56)">
      <rect width="238" height="78" rx="6" fill="#16181C" stroke="#252A30" stroke-width="1" />
      <rect width="3" height="30" rx="1.5" fill="#A9D36E" x="0" y="24" />
      <text x="16" y="24" class="node-title">React DOM Canvas</text>
      <text x="16" y="42" class="node-desc">Infinite zoom, pan, and live layout grids.</text>
      <text x="16" y="58" class="node-desc">Renders native React &amp; HTML nodes.</text>
    </g>

    <!-- Node 2: Zustand state manager -->
    <g transform="translate(16, 150)">
      <rect width="238" height="78" rx="6" fill="#16181C" stroke="#252A30" stroke-width="1" />
      <rect width="3" height="30" rx="1.5" fill="#A9D36E" x="0" y="24" />
      <text x="16" y="24" class="node-title">Zustand State Store</text>
      <text x="16" y="42" class="node-desc">Tracks camera points and active tools.</text>
      <text x="16" y="58" class="node-desc">80-checkpoint Undo/Redo stack.</text>
    </g>

    <!-- Node 3: Yjs CRDT Document -->
    <g transform="translate(16, 244)">
      <rect width="238" height="78" rx="6" fill="#16181C" stroke="#252A30" stroke-width="1" />
      <rect width="3" height="30" rx="1.5" fill="#A9D36E" x="0" y="24" />
      <text x="16" y="24" class="node-title">Yjs CRDT Client</text>
      <text x="16" y="42" class="node-desc">Tracks fine-grained node data maps.</text>
      <text x="16" y="58" class="node-desc">Conflict-safe property-level updates.</text>
    </g>

    <!-- Node 4: Presence Awareness -->
    <g transform="translate(16, 338)">
      <rect width="238" height="92" rx="6" fill="#16181C" stroke="#252A30" stroke-width="1" />
      <rect width="3" height="30" rx="1.5" fill="#A9D36E" x="0" y="31" />
      <text x="16" y="24" class="node-title">Yjs Awareness State</text>
      <text x="16" y="42" class="node-desc">Throttles cursor coordinates via</text>
      <text x="16" y="58" class="node-desc">requestAnimationFrame. Broadcasts</text>
      <text x="16" y="74" class="node-desc">active user highlights/selections.</text>
    </g>
  </g>

  <!-- ==================== COLUMN 2: EDGE WORKER ==================== -->
  <g transform="translate(390, 110)">
    <!-- Container Card -->
    <rect width="280" height="450" rx="10" fill="#111315" stroke="#1D2226" stroke-width="1.5" />
    <rect width="80" height="3" rx="1.5" fill="url(#orange-glow)" x="16" y="0" />
    <text x="16" y="26" class="group-title">CLOUDFLARE WORKER</text>
    <text x="16" y="40" class="metadata">SYSTEM_STATE: EDGE_RUNTIME</text>

    <!-- Node 1: Router & SSR -->
    <g transform="translate(16, 56)">
      <rect width="248" height="92" rx="6" fill="#16181C" stroke="#252A30" stroke-width="1" />
      <rect width="3" height="30" rx="1.5" fill="#F0643F" x="0" y="31" />
      <text x="16" y="24" class="node-title">TanStack Start Router</text>
      <text x="16" y="42" class="node-desc">Serves React Server-Side rendering</text>
      <text x="16" y="58" class="node-desc">and handles API client requests.</text>
      <text x="16" y="74" class="node-desc">Routes WebSockets to Durables.</text>
    </g>

    <!-- Node 2: Better Auth Handler -->
    <g transform="translate(16, 170)">
      <rect width="248" height="92" rx="6" fill="#16181C" stroke="#252A30" stroke-width="1" />
      <rect width="3" height="30" rx="1.5" fill="#F0643F" x="0" y="31" />
      <text x="16" y="24" class="node-title">Better Auth Module</text>
      <text x="16" y="42" class="node-desc">Manages guest display name header</text>
      <text x="16" y="58" class="node-desc">logins and encrypted Google OAuth</text>
      <text x="16" y="74" class="node-desc">account upgrade bindings.</text>
    </g>

    <!-- Node 3: Satori OG Engine -->
    <g transform="translate(16, 284)">
      <rect width="248" height="78" rx="6" fill="#16181C" stroke="#252A30" stroke-width="1" />
      <rect width="3" height="30" rx="1.5" fill="#F0643F" x="0" y="24" />
      <text x="16" y="24" class="node-title">OG Image Gen (cf-workers-og)</text>
      <text x="16" y="42" class="node-desc">Renders dynamic HTML-to-image</text>
      <text x="16" y="58" class="node-desc">social graphics directly at the edge.</text>
    </g>

    <!-- Node 4: Static Asset Loader -->
    <g transform="translate(16, 378)">
      <rect width="248" height="52" rx="6" fill="#16181C" stroke="#252A30" stroke-width="1" />
      <rect width="3" height="20" rx="1.5" fill="#F0643F" x="0" y="16" />
      <text x="16" y="22" class="node-title">Static Assets Gateway</text>
      <text x="16" y="38" class="node-desc">Delivers bundled scripts &amp; CSS links.</text>
    </g>
  </g>

  <!-- ==================== COLUMN 3: PERSISTENCE LAYER ==================== -->
  <!-- Top Box: CanvasRoom Durable Object -->
  <g transform="translate(720, 110)">
    <rect width="220" height="200" rx="10" fill="#111315" stroke="#1D2226" stroke-width="1.5" />
    <rect width="80" height="3" rx="1.5" fill="url(#blue-glow)" x="16" y="0" />
    <text x="16" y="26" class="group-title">DURABLE OBJECT</text>
    <text x="16" y="40" class="metadata">SYSTEM_STATE: PERSISTENT_DO</text>

    <!-- Detail Box -->
    <g transform="translate(16, 56)">
      <rect width="188" height="124" rx="6" fill="#16181C" stroke="#252A30" stroke-width="1" />
      <rect width="3" height="40" rx="1.5" fill="#50A0F0" x="0" y="42" />
      <text x="16" y="24" class="node-title">CanvasRoom : YServer</text>
      <text x="16" y="44" class="node-desc">WebSocket sync hub.</text>
      <text x="16" y="60" class="node-desc">Hibernate-enabled</text>
      <text x="16" y="76" class="node-desc">Durable Object storage</text>
      <text x="16" y="92" class="node-desc">debounces saves to disk</text>
      <text x="16" y="108" class="node-desc">as binary ArrayBuffers.</text>
    </g>
  </g>

  <!-- Bottom Box: D1 SQLite Database -->
  <g transform="translate(720, 360)">
    <rect width="220" height="200" rx="10" fill="#111315" stroke="#1D2226" stroke-width="1.5" />
    <rect width="80" height="3" rx="1.5" fill="url(#grey-glow)" x="16" y="0" />
    <text x="16" y="26" class="group-title">D1 SQL DATABASE</text>
    <text x="16" y="40" class="metadata">SYSTEM_STATE: STORAGE</text>

    <!-- Detail Box -->
    <g transform="translate(16, 56)">
      <rect width="188" height="124" rx="6" fill="#16181C" stroke="#252A30" stroke-width="1" />
      <rect width="3" height="40" rx="1.5" fill="#8E959E" x="0" y="42" />
      <text x="16" y="24" class="node-title">SQLite auth schema</text>
      <text x="16" y="44" class="node-desc">Stores user profiles,</text>
      <text x="16" y="60" class="node-desc">session tokens,</text>
      <text x="16" y="76" class="node-desc">Google OAuth hashes,</text>
      <text x="16" y="92" class="node-desc">and IP-based rate</text>
      <text x="16" y="108" class="node-desc">limiting records.</text>
    </g>
  </g>

  <!-- ==================== CONNECTING INTERACTIVE FLOWS ==================== -->
  
  <!-- Flow 1: Client to Worker (SSR / static assets) -->
  <path d="M 330 205 L 390 205" fill="none" stroke="#2A2F35" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 390 185 L 330 185" fill="none" stroke="#A9D36E" stroke-width="1.5" marker-end="url(#arrow-green)" filter="url(#glow-green)" />
  <text x="338" y="177" class="flow-label" fill="#A9D36E">HTML / SSR</text>

  <!-- Flow 2: Live WS Updates -->
  <path d="M 330 420 Q 360 420 375 390 T 390 320" fill="none" stroke="#2A2F35" stroke-width="1.5" />
  
  <!-- WebSocket Realtime stream (Green/Blue gradient flow) -->
  <path d="M 330 380 L 390 230" fill="none" stroke="#A9D36E" stroke-width="1.5" marker-end="url(#arrow-green)" />
  <path d="M 638 230 L 720 210" fill="none" stroke="#50A0F0" stroke-width="1.5" marker-end="url(#arrow-blue)" filter="url(#glow-blue)" />
  <text x="335" y="315" class="flow-label" fill="#A9D36E">YJS SOCKET</text>
  <text x="650" y="200" class="flow-label" fill="#50A0F0">ROOM STATE</text>

  <!-- Flow 3: Better Auth Drizzle connection to D1 -->
  <path d="M 638 320 Q 690 320 690 460 L 720 460" fill="none" stroke="#F0643F" stroke-width="1.5" marker-end="url(#arrow-orange)" filter="url(#glow-orange)" />
  <text x="645" y="340" class="flow-label" fill="#F0643F">SQL QUERY</text>
  
  <!-- Flow 4: Asset download requests -->
  <path d="M 330 500 L 390 500" fill="none" stroke="#3D444D" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="338" y="493" class="flow-label" fill="#878E95">ASSETS</text>

</svg>
